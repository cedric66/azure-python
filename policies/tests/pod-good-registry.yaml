# Complies with the "containers should only use allowed images" policy (mcr.microsoft.com).
apiVersion: v1
kind: Pod
metadata:
  name: policy-test-good-registry
  labels:
    app: policy-test
spec:
  containers:
    - name: nginx
      image: mcr.microsoft.com/azurelinux/base/nginx:1
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 64Mi
